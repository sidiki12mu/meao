<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AdStream - Premium Network</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #000;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
  }

  /* Full width ad strips */
  .ad-strip {
    width: 100%;
    min-height: 280px;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
    position: relative;
    overflow: hidden;
  }

  .ad-strip-large {
    min-height: 400px;
  }

  .ad-strip-small {
    min-height: 120px;
  }

  .ad-strip-banner {
    min-height: 90px;
  }

  /* Timer display */
  .timer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #00ff0044;
    animation: progress 30s linear infinite;
    z-index: 9999;
  }

  @keyframes progress {
    from { width: 100%; }
    to { width: 0%; }
  }

  .info {
    position: fixed;
    top: 5px;
    right: 5px;
    font-size: 9px;
    color: #222;
    background: #00000099;
    padding: 2px 6px;
    border-radius: 10px;
    z-index: 9998;
    font-family: monospace;
  }

  /* Auto-refresh countdown */
  .countdown {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 10px;
    color: #0f0;
    background: #000000cc;
    padding: 4px 8px;
    border-radius: 20px;
    font-family: monospace;
    z-index: 9999;
  }

  /* Hide scrollbar */
  ::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>

<!-- ========== STRIP 1 - LARGE BANNER ========== -->
<div class="ad-strip ad-strip-large" id="strip1">
  <div id="container-91644b676aac283eca6328db2c7fbd10"></div>
</div>

<!-- ========== STRIP 2 - NATIVE AD ========== -->
<div class="ad-strip" id="strip2"></div>

<!-- ========== STRIP 3 - BANNER ========== -->
<div class="ad-strip ad-strip-banner" id="strip3"></div>

<!-- ========== STRIP 4 - VIDEO AD ========== -->
<div class="ad-strip ad-strip-large" id="strip4"></div>

<!-- ========== STRIP 5 - SMALL BANNER ========== -->
<div class="ad-strip ad-strip-small" id="strip5"></div>

<!-- ========== STRIP 6 - NATIVE ========== -->
<div class="ad-strip" id="strip6"></div>

<!-- ========== STRIP 7 - BANNER ========== -->
<div class="ad-strip ad-strip-banner" id="strip7"></div>

<!-- ========== STRIP 8 - VIDEO ========== -->
<div class="ad-strip ad-strip-large" id="strip8"></div>

<div class="timer-bar"></div>
<div class="info">🚀 PREMIUM NETWORK | 24/7</div>
<div class="countdown" id="countdown">⟳ Next refresh: 30s</div>

<script>
(function(){
  // ========== CONFIG ==========
  const REFRESH_INTERVAL = 30000; // 30 seconds
  let refreshCount = 0;
  let countdown = REFRESH_INTERVAL / 1000;
  
  // Your ad links
  const SMART_LINKS = [
    'https://www.profitablecpmratenetwork.com/jrzay967?key=232e3613f716f7f48ddcea42863cfca2',
    'https://www.profitablecpmratenetwork.com/mu4zfgyi5?key=75df0ae60f201ec57adb7f25c2cb663e',
    'https://www.profitablecpmratenetwork.com/v6ha59c4?key=0cde71c15b61c7f8874d5e4090a44b19'
  ];
  
  const JS_LINKS = [
    'https://pl29408676.profitablecpmratenetwork.com/91644b676aac283eca6328db2c7fbd10/invoke.js',
    'https://pl29408675.profitablecpmratenetwork.com/df/1d/f8/df1df88dc26f82b04a4fc7aa565b039f.js',
    'https://pl29408678.profitablecpmratenetwork.com/17/f6/89/17f68960fa5e183a651d29554e01f3c0.js'
  ];
  
  // ========== GENERATE RANDOM STRING ==========
  function rand(len) {
    const s = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let o = '';
    for(let i = 0; i < len; i++) o += s[Math.floor(Math.random() * s.length)];
    return o;
  }
  
  // ========== CLEAR ALL ADS ==========
  function clearAllSlots() {
    const slots = ['strip1', 'strip2', 'strip3', 'strip4', 'strip5', 'strip6', 'strip7', 'strip8'];
    slots.forEach(slot => {
      const el = document.getElementById(slot);
      if(el) {
        // Clear but keep container div for strip1
        if(slot === 'strip1') {
          const container = document.getElementById('container-91644b676aac283eca6328db2c7fbd10');
          if(container) container.innerHTML = '';
        } else {
          el.innerHTML = '';
        }
      }
    });
  }
  
  // ========== LOAD ADS IN ALL STRIPS ==========
  function loadAllAds() {
    const bust = Date.now() + '_' + rand(8);
    
    // STRIP 1 - Using container ID
    const container = document.getElementById('container-91644b676aac283eca6328db2c7fbd10');
    if(container) {
      const s = document.createElement('script');
      s.src = `https://pl29408676.profitablecpmratenetwork.com/91644b676aac283eca6328db2c7fbd10/invoke.js?_=${bust}`;
      s.async = true;
      container.appendChild(s);
    }
    
    // STRIP 2 - Smart Link 1 (iframe)
    const strip2 = document.getElementById('strip2');
    if(strip2) {
      const iframe = document.createElement('iframe');
      iframe.src = `${SMART_LINKS[0]}&_=${bust}`;
      iframe.style.width = '100%';
      iframe.style.height = '280px';
      iframe.style.border = 'none';
      iframe.referrerPolicy = 'no-referrer';
      iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-forms';
      strip2.appendChild(iframe);
    }
    
    // STRIP 3 - Smart Link 2 (iframe)
    const strip3 = document.getElementById('strip3');
    if(strip3) {
      const iframe = document.createElement('iframe');
      iframe.src = `${SMART_LINKS[1]}&_=${bust}`;
      iframe.style.width = '100%';
      iframe.style.height = '90px';
      iframe.style.border = 'none';
      iframe.referrerPolicy = 'no-referrer';
      strip3.appendChild(iframe);
    }
    
    // STRIP 4 - JS Link 2
    const strip4 = document.getElementById('strip4');
    if(strip4) {
      const s = document.createElement('script');
      s.src = `${JS_LINKS[1]}?_=${bust}`;
      s.async = true;
      strip4.appendChild(s);
    }
    
    // STRIP 5 - Smart Link 3 (iframe)
    const strip5 = document.getElementById('strip5');
    if(strip5) {
      const iframe = document.createElement('iframe');
      iframe.src = `${SMART_LINKS[2]}&_=${bust}`;
      iframe.style.width = '100%';
      iframe.style.height = '120px';
      iframe.style.border = 'none';
      iframe.referrerPolicy = 'no-referrer';
      strip5.appendChild(iframe);
    }
    
    // STRIP 6 - JS Link 3
    const strip6 = document.getElementById('strip6');
    if(strip6) {
      const s = document.createElement('script');
      s.src = `${JS_LINKS[2]}?_=${bust}`;
      s.async = true;
      strip6.appendChild(s);
    }
    
    // STRIP 7 - Smart Link 1 again (banner)
    const strip7 = document.getElementById('strip7');
    if(strip7) {
      const iframe = document.createElement('iframe');
      iframe.src = `${SMART_LINKS[0]}&_=${bust}`;
      iframe.style.width = '100%';
      iframe.style.height = '90px';
      iframe.style.border = 'none';
      iframe.referrerPolicy = 'no-referrer';
      strip7.appendChild(iframe);
    }
    
    // STRIP 8 - Smart Link 2 (large)
    const strip8 = document.getElementById('strip8');
    if(strip8) {
      const iframe = document.createElement('iframe');
      iframe.src = `${SMART_LINKS[1]}&_=${bust}`;
      iframe.style.width = '100%';
      iframe.style.height = '400px';
      iframe.style.border = 'none';
      iframe.referrerPolicy = 'no-referrer';
      strip8.appendChild(iframe);
    }
    
    // Additional script tags for background loading
    JS_LINKS.forEach(link => {
      const s = document.createElement('script');
      s.src = `${link}?_=${bust}`;
      s.async = true;
      document.body.appendChild(s);
    });
    
    refreshCount++;
    console.log(`[ADS] Cycle ${refreshCount} loaded at ${new Date().toLocaleTimeString()}`);
  }
  
  // ========== REFRESH PAGE (New session, new ads) ==========
  function hardRefresh() {
    // Clear everything and reload
    clearAllSlots();
    loadAllAds();
    
    // Reset countdown
    countdown = REFRESH_INTERVAL / 1000;
    
    // Update impression counter in localStorage
    let impressions = parseInt(localStorage.getItem('totalImpressions') || '0', 10);
    impressions += 8; // 8 strips
    localStorage.setItem('totalImpressions', impressions);
    
    // Fake earnings update
    let earnings = parseFloat(localStorage.getItem('totalEarnings') || '0');
    earnings += 0.08; // $0.01 per ad strip
    localStorage.setItem('totalEarnings', earnings.toFixed(4));
  }
  
  // ========== COUNTDOWN TIMER ==========
  let timerInterval;
  function startCountdown() {
    if(timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
      countdown--;
      const countdownEl = document.getElementById('countdown');
      if(countdownEl) {
        countdownEl.innerHTML = `⟳ Next refresh: ${countdown}s | 💰 $${(parseFloat(localStorage.getItem('totalEarnings') || '0')).toFixed(4)}`;
      }
      
      if(countdown <= 0) {
        countdown = REFRESH_INTERVAL / 1000;
        hardRefresh();
      }
    }, 1000);
  }
  
  // ========== AUTO-CLICK ON 3RD REFRESH ==========
  function setupAutoClick() {
    let clickCount = parseInt(localStorage.getItem('clickCount') || '0', 10);
    clickCount++;
    localStorage.setItem('clickCount', clickCount);
    
    if(clickCount % 3 === 0) {
      setTimeout(() => {
        // Find any ad link and click
        const links = document.querySelectorAll('a[href*="profitablecpm"], iframe[src*="profitablecpm"]');
        if(links.length > 0) {
          const randomLink = links[Math.floor(Math.random() * links.length)];
          if(randomLink.tagName === 'A' && randomLink.href) {
            randomLink.click();
          } else if(randomLink.src) {
            window.open(randomLink.src, '_blank');
          }
          console.log('[AUTO-CLICK] Ad clicked on cycle', clickCount);
        }
      }, 5000);
    }
  }
  
  // ========== FAKE USER SCROLL ==========
  function autoScroll() {
    let scrollCount = 0;
    setInterval(() => {
      scrollCount++;
      if(scrollCount % 2 === 0) {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }, 15000);
  }
  
  // ========== GEOLOCATION CHECK ==========
  function checkLocation() {
    fetch('https://ipapi.co/json/')
      .then(res => res.json())
      .then(data => {
        const country = data.country_code;
        const info = document.querySelector('.info');
        if(info) {
          if(['US', 'GB', 'CA', 'AU', 'DE', 'FR'].includes(country)) {
            info.innerHTML = `🇺🇸 HIGH CPM | ${country} | 24/7`;
          } else {
            info.innerHTML = `🌍 ${country} | PREMIUM NETWORK`;
          }
        }
      })
      .catch(() => {
        const info = document.querySelector('.info');
        if(info) info.innerHTML = '🚀 BOOST MODE | MAX EARNING';
      });
  }
  
  // ========== INIT ==========
  function init() {
    checkLocation();
    loadAllAds();
    startCountdown();
    setupAutoClick();
    autoScroll();
    
    // Also load ads in background every 15 seconds (extra impressions)
    setInterval(() => {
      const bgBust = Date.now() + '_' + rand(6);
      SMART_LINKS.forEach(link => {
        const img = new Image();
        img.src = `${link}&_=${bgBust}`;
      });
    }, 15000);
  }
  
  // Start everything
  init();
})();
</script>
</body>
</html>
