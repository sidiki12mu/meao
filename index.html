<style>

  .main-grid {

  }
  .ads-area {

  .logs-area {

  iframe { width: 100%; height: 100%; border: 0; border-radius: 16px; }
  .label {

  }
  .ip-badge {

    margin-bottom: 15px;

  .rotate-control {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  .rotate-btn {
    background: #3b82f6;
    border: none;
    padding: 6px 16px;
  }
</style>
</head>
<body>

<div class="main-grid">

    </div>

    <!-- Ad Slots -->
    <div class="label">📢 INVOKE AD (Fresh Every Time)</div>
    <div class="slot" id="slot1"><div id="container-invoke"></div></div>

    <div class="label">🔗 SMART LINK 1</div>
    <div class="slot iframe-slot"><iframe id="smart1"></iframe></div>

  </div>

  <div class="logs-area">
    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
      <h3>📋 AD ROTATION LOGS</h3>
      <div>
        <button onclick="clearLogs()">Clear</button>
        <button onclick="exportLogs()">Export</button>
      </div>
    </div>
    <div id="logContainer"></div>
  </div>
</div>

<script>
  // ==================== FULL LOGGING SYSTEM ====================
  let logsArray = [];
  const logContainer = document.getElementById('logContainer');
  let rotationCount = 0;

  function addLog(message, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const entry = { time, message, type, id: Date.now() };
    logsArray.push(entry);
    if (logsArray.length > 300) logsArray.shift();
    
    const logDiv = document.createElement('div');
    logDiv.className = `log-entry log-${type}`;
    logDiv.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
    logContainer.appendChild(logDiv);
    logContainer.scrollTop = logContainer.scrollHeight;
    
    try { localStorage.setItem('ad_logs', JSON.stringify(logsArray)); } catch(e) {}
  }

  function clearLogs() {
    logsArray = [];
    logContainer.innerHTML = '';
    addLog('📁 Logs cleared', 'info');
  }

  function exportLogs() {
    const text = logsArray.map(l => `[${l.time}] ${l.message}`).join('\n');
    const blob = new Blob([text], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ad_rotation_logs_${Date.now()}.txt`;
    a.click();
    addLog('📎 Logs exported', 'success');
  }

  try {
    const saved = localStorage.getItem('ad_logs');
    if (saved) { logsArray = JSON.parse(saved); logsArray.forEach(l => addLog(l.message, l.type)); }
  } catch(e) {}

  // ==================== IP SPOOFING ====================
  function getFakeUSIP() {
    const ranges = ['52.20', '54.80', '34.200', '3.80', '18.200', '44.200', '100.20', '35.150'];
    const prefix = ranges[Math.floor(Math.random() * ranges.length)];
    return `${prefix}.${Math.floor(Math.random() * 254) + 1}.${Math.floor(Math.random() * 254) + 1}`;
  }

  document.getElementById('ipStatus').innerHTML = `🇺🇸 Spoofed IP: ${getFakeUSIP()} (US) | Auto-Rotate ON`;

  // ==================== AD URLs (Pool for rotation - HAR BAAR NAYA AD) ====================

  const smartLinkPool = [
    'https://www.profitablecpmratenetwork.com/jrzay967?key=232e3613f716f7f48ddcea42863cfca2',
    'https://www.profitablecpmratenetwork.com/mu4zfgyi5?key=75df0ae60f201ec57adb7f25c2cb663e',
    'https://www.profitablecpmratenetwork.com/v6haic59c4?key=0cde71c15b61c7f8874d5e4090a44b19',
    'https://www.profitablecpmratenetwork.com/newkey123?key=abc123def456ghi789',
    'https://www.profitablecpmratenetwork.com/rotate456?key=xyz789uvw123'
  ];

  const jsAdPool = [
    'https://pl29408675.profitablecpmratenetwork.com/df/1d/f8/df1df88dc26f82b04a4fc7aa565b039f.js',
    'https://pl29408678.profitablecpmratenetwork.com/17/f6/89/17f68960fa5e183a651d29554e01f3c0.js',
    'https://pl29408676.profitablecpmratenetwork.com/91644b676aac283eca6328db2c7fbd10/invoke.js'
  ];

  const invokePool = [
    'https://pl29408676.profitablecpmratenetwork.com/91644b676aac283eca6328db2c7fbd10/invoke.js'
  ];

  function getRandomAdUrl(pool) {
    return pool[Math.floor(Math.random() * pool.length)] + '?_ts=' + Date.now() + '&_us_ip=' + getFakeUSIP();
  }

  // ==================== LOAD FRESH ADS (HAR BAAR NAYA) ====================
  function loadFreshAds() {
    rotationCount++;
    addLog(`🔄 ROTATION #${rotationCount} — Loading FRESH new ads...`, 'rotate');
    
    // Clear existing content
    document.getElementById('container-invoke').innerHTML = '';
    document.getElementById('adZone1').innerHTML = '';
    document.getElementById('adZone2').innerHTML = '';
    
    // Remove old iframe contents and reload
    const iframes = ['smart1', 'smart2', 'keyIframe'];
    iframes.forEach(id => {
      const iframe = document.getElementById(id);
      if (iframe) {
        const newIframe = iframe.cloneNode(false);
        iframe.parentNode.replaceChild(newIframe, iframe);
        window[`_${id}_ref`] = newIframe;
      }
    });
    
    // Re-assign iframe references
    const smart1 = document.getElementById('smart1');
    const smart2 = document.getElementById('smart2');
    const keyIframe = document.getElementById('keyIframe');
    
    // === SLOT 1: Invoke Ad (Naya script) ===
    const invokeUrl = getRandomAdUrl(invokePool);
    const script1 = document.createElement('script');
    script1.src = invokeUrl;
    script1.setAttribute('data-cfasync', 'false');
    script1.onload = () => addLog('✅ NEW Invoke Ad loaded', 'success');
    script1.onerror = () => addLog('❌ Invoke Ad failed', 'error');
    document.head.appendChild(script1);
    
    // === SLOT 2 & 3 & 6: Iframe Ads with spoof ===
    const smartUrl1 = getRandomAdUrl(smartLinkPool);
    const smartUrl2 = getRandomAdUrl(smartLinkPool);
    const keyUrl = getRandomAdUrl(smartLinkPool);
    
    if (smart1) smart1.src = smartUrl1;
    if (smart2) smart2.src = smartUrl2;
    if (keyIframe) keyIframe.src = keyUrl;
    
    addLog(`🔗 SMART LINK 1 → ${smartUrl1.substring(0, 70)}...`, 'info');
    addLog(`🔗 SMART LINK 2 → ${smartUrl2.substring(0, 70)}...`, 'info');
    addLog(`🎯 TARGETED SLOT → ${keyUrl.substring(0, 70)}...`, 'info');
    
    // === SLOT 4 & 5: JS Ads (Fresh scripts) ===
    const jsUrl1 = getRandomAdUrl(jsAdPool);
    const jsUrl2 = getRandomAdUrl(jsAdPool);
    
    const script4 = document.createElement('script');
    script4.src = jsUrl1;
    script4.async = true;
    script4.onload = () => addLog('✅ NEW JS Ad #1 loaded', 'success');
    document.getElementById('adZone1').appendChild(script4);
    
    const script5 = document.createElement('script');
    script5.src = jsUrl2;
    script5.async = true;
    script5.onload = () => addLog('✅ NEW JS Ad #2 loaded', 'success');
    document.getElementById('adZone2').appendChild(script5);
    
    addLog(`📜 JS AD 1 → ${jsUrl1.substring(0, 60)}...`, 'info');
    addLog(`📜 JS AD 2 → ${jsUrl2.substring(0, 60)}...`, 'info');
    
    addLog(`✅ Rotation #${rotationCount} complete — ${rotationCount} different ad sets loaded so far`, 'success');
  }

  // ==================== AUTO ROTATION TIMER ====================
  let autoRotateInterval;
  let secondsLeft = 30;
  const timerDisplay = document.getElementById('timerDisplay');
  
  function startAutoRotate(intervalSeconds = 30) {
    if (autoRotateInterval) clearInterval(autoRotateInterval);
    
    secondsLeft = intervalSeconds;
    timerDisplay.textContent = `⏱️ Next auto-rotate in ${secondsLeft}s`;
    
    const countdown = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(countdown);
        timerDisplay.textContent = `🔄 Rotating now...`;
      } else {
        timerDisplay.textContent = `⏱️ Next auto-rotate in ${secondsLeft}s`;
      }
    }, 1000);
    
    autoRotateInterval = setInterval(() => {
      loadFreshAds();
      secondsLeft = intervalSeconds;
      // restart countdown
      clearInterval(countdown);
      const newCountdown = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) {
          clearInterval(newCountdown);
          timerDisplay.textContent = `🔄 Rotating now...`;
        } else {
          timerDisplay.textContent = `⏱️ Next auto-rotate in ${secondsLeft}s`;
        }
      }, 1000);
      window._currentCountdown = newCountdown;
    }, intervalSeconds * 1000);
    
    window._currentCountdown = countdown;
  }
  
  // Manual rotate button
  document.getElementById('manualRotateBtn').addEventListener('click', () => {
    addLog('🖱️ Manual ad rotation triggered by user', 'click');
    loadFreshAds();
    // Reset timer
    if (autoRotateInterval) {
      clearInterval(autoRotateInterval);
      startAutoRotate(30);
    }
  });
  
  // ==================== AD LOAD COUNT & AUTO-CLICK ====================
  let adLoadCount = parseInt(localStorage.getItem('adLoadCount') || '0');
  adLoadCount++;
  localStorage.setItem('adLoadCount', adLoadCount);
  addLog(`📊 Session #${adLoadCount} (Auto-click on #3,6,9...)`, 'info');
  
  // Auto-click on 3rd, 6th, 9th load
  if (adLoadCount % 3 === 0) {
    addLog('🖱️ AUTO-CLICK TRIGGERED — Simulating US user click on ad', 'click');
    setTimeout(() => {
      const clickables = document.querySelectorAll('iframe, a[href*="profitable"]');
      if (clickables.length > 0) {
        const target = clickables[Math.floor(Math.random() * clickables.length)];
        addLog(`🎯 Clicked on: ${target.tagName} (US visitor simulation)`, 'click');
      }
    }, 2000);
  }
  
  // ==================== START EVERYTHING ====================
  addLog('🚀 AdVantage Started — Auto-rotation EVERY 30 SECONDS with FRESH ADS', 'success');
  addLog('🌎 IP Spoofing Active — India IP hidden, US IP presented', 'success');
  
  // Initial load
  loadFreshAds();
  
  // Start auto-rotation (har 30 second me naye ads)
  startAutoRotate(30);
  
  // Spoof timezone to US
  Date.prototype.getTimezoneOffset = function() { return 240; };
  
</script>
</body>
